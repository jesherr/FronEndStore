<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrontEnd | Store</title>
    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Staatliches&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Staatliches&display=swap"

    <link rel="stylesheet" href="Css/normalize.css">

<body>
    <header class="header">

        <div class="grid">

            </div> <!--producto-->

            <div class="producto">

                    <img class="producto__imagen" src="img/2.jpg" alt="imagen camiseta">

                        <p class="producto__nombre">Angular JS</p>

                    </div>

            </div> <!--producto-->

            <div class="producto">
                <a href="productos.html">
                    <img class="producto__imagen" src="img/5.jpg" alt="imagen camiseta">
                    <div class="producto__informacion">
                        <p class="producto__nombre">VueJS</p>
                        <p clas="producto__precio">$25</p>
                    </div>
                </a>
            </div> <!--producto-->

        <p class="footer__texto">Front End Store | todos los derechos reservados</p>
    </footer>

</html>
